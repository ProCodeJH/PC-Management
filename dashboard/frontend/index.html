<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
        .pc-card { transition: all 0.3s ease; }
        .pc-card:hover { transform: translateY(-2px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .status-online { background: #22c55e; box-shadow: 0 0 8px rgba(34,197,94,0.5); }
        .status-offline { background: #94a3b8; }
        .bar { height: 6px; border-radius: 3px; background: #e2e8f0; overflow: hidden; }
        .bar-fill { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
        .bar-cpu { background: linear-gradient(90deg, #3b82f6, #2563eb); }
        .bar-mem { background: linear-gradient(90deg, #f59e0b, #ef4444); }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">

    <!-- Login -->
    <div id="login-screen" class="flex items-center justify-center min-h-screen">
        <div class="bg-white rounded-2xl shadow-lg p-8 w-full max-w-sm">
            <h1 class="text-xl font-bold text-center mb-6">PC Manager</h1>
            <input id="login-user" type="text" placeholder="Username" value="admin"
                class="w-full px-4 py-3 border rounded-lg mb-3 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <input id="login-pass" type="password" placeholder="Password"
                class="w-full px-4 py-3 border rounded-lg mb-4 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button id="login-btn"
                class="w-full py-3 bg-blue-600 text-white rounded-lg font-semibold hover:bg-blue-700 transition">
                Login
            </button>
            <p id="login-error" class="text-red-500 text-sm text-center mt-3 hidden"></p>
        </div>
    </div>

    <!-- Dashboard -->
    <div id="dashboard" class="hidden">
        <!-- Header -->
        <header class="bg-white border-b px-6 py-4 flex items-center justify-between">
            <div>
                <h1 class="text-lg font-bold text-gray-800">PC Manager</h1>
                <p class="text-sm text-gray-500" id="header-status">Connecting...</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-6 text-sm">
                    <span id="stat-total" class="font-semibold">0</span>
                    <span class="text-green-600 font-semibold" id="stat-online">0 online</span>
                    <span class="text-gray-400" id="stat-offline">0 offline</span>
                </div>
                <button id="logout-btn" class="text-sm text-gray-400 hover:text-gray-600">Logout</button>
            </div>
        </header>

        <!-- PC Grid -->
        <main class="p-6">
            <div id="pc-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- PC cards rendered here -->
            </div>
            <div id="empty-state" class="text-center py-20 text-gray-400">
                <p class="text-4xl mb-4">&#x1F4BB;</p>
                <p class="text-lg">No PCs connected</p>
                <p class="text-sm mt-2">Run INSTALL.bat on student PCs to connect</p>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
